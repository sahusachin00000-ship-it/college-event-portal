<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — CampusArena</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="index.html" class="brand"><span class="stub-dot"></span> CampusArena</a>
    <div class="nav-links"><a href="index.html">Home</a><a href="events.html">Events</a></div>
    <div class="nav-user" id="navUserSlot"></div>
  </div>
</nav>

<div class="auth-shell">
  <div class="card">
    <h2>Welcome back</h2>
    <p class="sub">Log in to register for events and track your participation.</p>

    <div class="alert alert-error" id="errorAlert"></div>

    <form id="loginForm">
      <div class="field">
        <label for="email">College email</label>
        <input type="email" id="email" required placeholder="you@college.edu">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Log in</button>
    </form>

    <div class="form-footer">
      New here? <a href="register.html">Create an account</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>

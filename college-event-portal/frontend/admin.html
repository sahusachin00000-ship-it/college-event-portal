<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — CampusArena</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="index.html" class="brand"><span class="stub-dot"></span> CampusArena</a>
    <div class="nav-links"><a href="index.html">Home</a><a href="events.html">Events</a></div>
    <div class="nav-user" id="navUserSlot"></div>
  </div>
</nav>

<section class="section" style="padding-top: 48px;">
  <div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; margin-bottom: 28px;">
      <div>
        <h1 style="font-size: 2rem; margin-bottom: 4px;">Admin panel</h1>
        <p style="color: var(--muted);">Create and manage events for your college.</p>
      </div>
      <button class="btn btn-primary" id="newEventBtn">+ New event</button>
    </div>

    <div id="alertBox" class="alert"></div>

    <table class="admin-table">
      <thead>
        <tr>
          <th>Event</th>
          <th>Category</th>
          <th>Date</th>
          <th>Registered</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="adminTableBody">
        <tr><td colspan="6" style="color: var(--muted);">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</section>

<!-- Create / Edit Event Modal -->
<div class="modal-overlay" id="eventModal">
  <div class="modal-box">
    <h2 id="modalTitle">New event</h2>
    <form id="eventForm">
      <input type="hidden" id="eventId">
      <div class="field">
        <label for="title">Event title</label>
        <input type="text" id="title" required placeholder="e.g. Code Sprint 2026">
      </div>
      <div class="field">
        <label for="description">Description</label>
        <textarea id="description" required placeholder="What is this event about?"></textarea>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="category">Category</label>
          <select id="category">
            <option>Technical</option>
            <option>Sports</option>
            <option>Cultural</option>
            <option>Other</option>
          </select>
        </div>
        <div class="field">
          <label for="maxParticipants">Max participants</label>
          <input type="number" id="maxParticipants" min="1" required placeholder="60">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="date">Date</label>
          <input type="date" id="date" required>
        </div>
        <div class="field">
          <label for="time">Time</label>
          <input type="time" id="time" required>
        </div>
      </div>
      <div class="field">
        <label for="venue">Venue</label>
        <input type="text" id="venue" required placeholder="e.g. Main Auditorium">
      </div>
      <div class="field">
        <label for="status">Status</label>
        <select id="status">
          <option value="open">Open</option>
          <option value="closed">Closed</option>
        </select>
      </div>
      <div style="display:flex; gap: 12px; margin-top: 8px;">
        <button type="button" class="btn btn-ghost btn-block" id="cancelModalBtn">Cancel</button>
        <button type="submit" class="btn btn-primary btn-block" id="saveEventBtn">Save event</button>
      </div>
    </form>
  </div>
</div>

<!-- Participants Modal -->
<div class="modal-overlay" id="participantsModal">
  <div class="modal-box">
    <h2 id="participantsTitle">Participants</h2>
    <div id="participantsList" style="margin-top: 16px;"></div>
    <button class="btn btn-ghost btn-block" id="closeParticipantsBtn" style="margin-top: 20px;">Close</button>
  </div>
</div>

<footer>Built for college fests &amp; sports meets · CampusArena</footer>

<script src="js/api.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
